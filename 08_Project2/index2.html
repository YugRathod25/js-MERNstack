<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <form>
            <p><label for="height">Height in CM: </label><input type="text" id="height"></p>
            <p><label for="weight">Weight in KG: </label><input type="text" id="weight"></p>
            <button id="calc">Calculate</button>
            <div id="results"></div>
            <div id="weight-guide">
                <h3>BMI Weight Guide</h3>
                <p>Under weight = Less then 18.6</p>
                <p>Normal weight = 18.6 and 24.9</p>
                <p>Overweight = Greater then 24.9</p>

            </div>
        </form>
    </div>  
</body>
    <script src="script2.js"></script>
</html>
